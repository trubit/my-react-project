<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trusonxchanger</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate Script for Automatic Translation -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en", // Default language = English
            includedLanguages: "en,es,bn,fr,de,zh-CN", // Languages you support (add more codes)
            autoDisplay: false, // Hide default Google bar
          },
          "google_translate_element",
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <script>
      // Force reset to English on page load
      window.addEventListener("load", function () {
        setTimeout(() => {
          const select = document.querySelector(".goog-te-combo");
          if (select) {
            select.value = "en";
            select.dispatchEvent(new Event("change"));
          }
        }, 1500); // Small delay to let Google load
      });
    </script>

    <!-- Hidden container -->
    <div id="google_translate_element" style="display: none"></div>
  </body>
</html>
